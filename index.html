<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Naura 🌷</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Gloock:ital@0;1&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: #FDF0F4;
  color: #3D1A27;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

:root {
  --blush:      #FDF0F4;
  --rose-soft:  #F5C8D8;
  --rose:       #E8A0B8;
  --rose-deep:  #C26880;
  --plum:       #3D1A27;
  --plum-mid:   #7A3D55;
  --plum-light: #B87A94;
  --cream:      #FEF5F8;
}

/* ── PROGRESS BAR ── */
#progress {
  position: fixed; top: 0; left: 0; z-index: 999;
  height: 2.5px;
  background: linear-gradient(90deg, #E8A0B8, #C26880, #E8A0B8);
  background-size: 200% 100%;
  animation: shiftGrad 3s linear infinite;
  transition: width 0.08s;
  width: 0%;
}
@keyframes shiftGrad {
  0%   { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

/* ── CANVAS PARTICLES ── */
#particle-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; width: 100%; height: 100%;
}

/* ══ COVER ══ */
#cover {
  position: relative; z-index: 1;
  min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 28px 88px;
  overflow: hidden;
}

.cover-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(245,200,216,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 80%,  rgba(232,160,184,0.3)  0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 70%,  rgba(253,240,244,0.8)  0%, transparent 60%),
    #FDF0F4;
  z-index: -1;
}

.cover-orb {
  position: absolute; border-radius: 50%;
  filter: blur(60px); pointer-events: none;
}
.orb-1 { width: 260px; height: 260px; background: rgba(232,160,184,0.22); top: -60px; right: -80px; }
.orb-2 { width: 200px; height: 200px; background: rgba(245,200,216,0.3);  bottom: 40px; left: -60px; }

.cover-tag {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: 0.68rem; letter-spacing: 0.45em;
  text-transform: uppercase; color: var(--plum-light);
  margin-bottom: 28px;
  opacity: 0; animation: riseIn 0.9s 0.3s forwards;
}

.cover-tulips {
  margin-bottom: 22px;
  opacity: 0; animation: riseIn 1s 0.5s forwards;
}

.cover-heading {
  font-family: 'Gloock', serif;
  font-size: clamp(2.1rem, 9vw, 3rem);
  color: var(--rose-deep);
  text-align: center; line-height: 1.15;
  opacity: 0; animation: riseIn 1s 0.7s forwards;
}

.cover-name {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(1.9rem, 8.5vw, 2.7rem);
  color: var(--plum); text-align: center; line-height: 1.2; margin-top: 8px;
  opacity: 0; animation: riseIn 1s 0.95s forwards;
}

.cover-date-pill {
  margin-top: 30px; padding: 9px 22px; border-radius: 40px;
  border: 1px solid rgba(194,104,128,0.28);
  background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
  font-family: 'Outfit', sans-serif; font-size: 0.75rem;
  font-weight: 300; letter-spacing: 0.18em; color: var(--plum-mid);
  opacity: 0; animation: riseIn 1s 1.2s forwards;
}

.cover-scroll {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0; animation: fadeIn 1s 2s forwards;
}
.cover-scroll span { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--plum-light); }
.chevron {
  width: 16px; height: 16px;
  border-right: 1.5px solid var(--rose); border-bottom: 1.5px solid var(--rose);
  transform: rotate(45deg); animation: bobDown 1.5s ease-in-out infinite;
}
@keyframes bobDown {
  0%,100% { transform: rotate(45deg) translateY(0); }
  50%      { transform: rotate(45deg) translateY(5px); }
}

/* ══ CARD LAYOUT ══ */
.para-section {
  position: relative; z-index: 1;
  padding: 20px 22px;
  display: flex; justify-content: center;
}

/* Card wrapper allows overflow for corner flowers */
.card-wrap {
  width: 100%; max-width: 420px;
  position: relative;
}

.card {
  position: relative;
  border-radius: 20px;
  padding: 30px 26px 28px;
  overflow: visible;
  opacity: 0; transform: translateY(32px);
  transition: opacity 0.75s ease, transform 0.75s ease;
}
.card.in { opacity: 1; transform: translateY(0); }

.card-a {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 36px rgba(194,104,128,0.09), 0 1px 8px rgba(194,104,128,0.06);
}
.card-b {
  background: linear-gradient(135deg, rgba(245,200,216,0.32) 0%, rgba(255,255,255,0.72) 100%);
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 36px rgba(194,104,128,0.08);
}

/* ── FLORAL BORDER ── */
.floral-border {
  position: absolute; inset: 0;
  border-radius: 20px;
  pointer-events: none; z-index: 2;
  overflow: visible;
}

/* the SVG rect border (JS will size it) */
.fb-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  overflow: visible;
}

/* Corner flower clusters — 48×48 each */
.fc {
  position: absolute; width: 52px; height: 52px;
  overflow: visible;
}
.fc-tl { top: -10px; left: -10px; }
.fc-tr { top: -10px; right: -10px; transform: scaleX(-1); }
.fc-bl { bottom: -10px; left: -10px; transform: scaleY(-1); }
.fc-br { bottom: -10px; right: -10px; transform: scale(-1,-1); }

/* ── CARD TEXT ── */
.card-text {
  position: relative; z-index: 1;
  font-family: 'Playfair Display', serif;
  font-size: clamp(0.95rem, 3.8vw, 1.08rem);
  line-height: 1.95; color: var(--plum); font-weight: 400;
}

/* ══ CLOSING ══ */
#closing {
  position: relative; z-index: 1;
  min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 28px 80px; text-align: center; overflow: hidden;
}
.closing-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 100%, rgba(232,160,184,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 70% 50% at 20% 20%,  rgba(245,200,216,0.3) 0%, transparent 60%),
    #FDF0F4;
  z-index: -1;
}

.closing-inner {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.closing-inner.in { opacity: 1; transform: translateY(0); }

.closing-label {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: 0.65rem; letter-spacing: 0.5em;
  text-transform: uppercase; color: var(--plum-light);
}
.closing-big {
  font-family: 'Gloock', serif;
  font-size: clamp(1.7rem, 7.5vw, 2.4rem);
  color: var(--rose-deep); line-height: 1.2;
}
.closing-quote {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(0.9rem, 3.5vw, 1.05rem);
  color: var(--plum-mid); max-width: 300px; line-height: 1.8;
}
.closing-divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rose), transparent);
  margin: 4px 0;
}
.closing-by {
  font-family: 'Outfit', sans-serif; font-weight: 200;
  font-size: 0.68rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--plum-light);
}
.closing-name {
  font-family: 'Gloock', serif; font-style: italic;
  font-size: clamp(1.3rem, 5.5vw, 1.7rem); color: var(--plum);
}

/* ── UTILITY ANIMATIONS ── */
@keyframes riseIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

.gap-section { height: 8px; }

</style>
</head>

<script>
/* ══════════════════════════════════════
   CORNER FLOWER SVG — top-left orientation
   (other corners use CSS transform to mirror)
   viewBox 0 0 54 54
══════════════════════════════════════ */
function cornerFlowerSVG(color1, color2, stemColor) {
  return `<svg class="fc" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <!-- stem from top-left corner going to inner bottom-right -->
    <path d="M8 8 Q18 22 28 38" stroke="${stemColor}" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- leaf off stem left -->
    <path d="M16 20 Q8 14 7 8 Q13 10 18 19Z" fill="${stemColor}" opacity="0.7"/>
    <!-- leaf off stem right -->
    <path d="M22 30 Q30 24 32 18 Q27 22 20 30Z" fill="${stemColor}" opacity="0.6"/>
    <!-- small bud at stem end -->
    <circle cx="28" cy="39" r="2.8" fill="${color2}" opacity="0.5"/>
    <!-- main tulip petals at corner -->
    <!-- back petals -->
    <path d="M8 8 Q1 3 2 -3 Q5 -8 9 -5 Q10 0 9 7Z" fill="${color1}" stroke="${color2}" stroke-width="0.7" opacity="0.75"/>
    <path d="M8 8 Q14 1 13 -5 Q10 -9 7 -6 Q7 -1 8 7Z" fill="${color1}" stroke="${color2}" stroke-width="0.7" opacity="0.75"/>
    <!-- front petal -->
    <path d="M8 8 Q4 0 6 -6 Q8 -10 10 -6 Q12 0 8 8Z" fill="white" stroke="${color2}" stroke-width="0.8"/>
    <!-- stamen dot -->
    <circle cx="8" cy="-7" r="2.2" fill="${color2}" opacity="0.7"/>
    <!-- tiny side rosette -->
    <circle cx="23" cy="14" r="3.5" fill="${color1}" opacity="0.55"/>
    <circle cx="23" cy="14" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="23" cy="14" r="0.9" fill="${color2}" opacity="0.6"/>
  </svg>`;
}

/* ══════════════════════════════════════
   BORDER SVG — thin dashed rose line
══════════════════════════════════════ */
function borderSVG() {
  return `<svg class="fb-svg" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <rect class="fb-rect" rx="18" ry="18"
      fill="none" stroke="#E8A0B8" stroke-width="1.1"
      stroke-dasharray="6 4" opacity="0.5"/>
    <!-- mid-top small diamond ornament -->
    <polygon class="fb-mid-top" fill="#E8A0B8" opacity="0.45"
      points="0,-4 3,0 0,4 -3,0"/>
    <!-- mid-bottom -->
    <polygon class="fb-mid-bot" fill="#E8A0B8" opacity="0.45"
      points="0,-4 3,0 0,4 -3,0"/>
    <!-- mid-left -->
    <polygon class="fb-mid-lft" fill="#E8A0B8" opacity="0.45"
      points="-4,0 0,3 4,0 0,-3"/>
    <!-- mid-right -->
    <polygon class="fb-mid-rgt" fill="#E8A0B8" opacity="0.45"
      points="-4,0 0,3 4,0 0,-3"/>
  </svg>`;
}

/* ══════════════════════════════════════
   CARD PARAGRAPHS DATA
══════════════════════════════════════ */
const paragraphs = [
  `Ngga kerasa ya, sekarang kamu sudah sampai di usia 22 tahun. Rasanya baru kemarin kita melewati hari-hari yang penuh cerita, dan sekarang aku bisa melihat sejauh apa kamu sudah bertumbuh menjadi pribadi yang luar biasa. Di hari spesial ini, aku cuma ingin kamu tahu kalau aku bangga banget sama kamu.`,
  `Setahun terakhir ini bukan tahun yang mudah buat kamu. Aku liat sendiri bagaimana kamu berjuang melewati banyak hal, mulai dari KKN, harus beradaptasi dengan lingkungan baru, sampai merantau untuk magang seorang diri. Banyak capek yang mungkin ngga selalu bisa kamu ceritakan, banyak sedih yang mungkin kamu simpan sendiri, dan banyak tekanan yang harus kamu hadapi setiap hari. Tapi di tengah semua itu, kamu tetap bertahan, tetap berjalan, dan tetap berusaha memberikan yang terbaik. Terima kasih karena sudah sekuat itu.`,
  `Aku juga ingin berterima kasih karena selama setahun ini kita sudah melewati banyak hal bersama. Ada hari-hari yang penuh tawa, ada hari-hari yang penuh air mata, ada saat kita baik-baik saja, ada juga saat kita harus menghadapi masalah dan kesalahpahaman. Tapi pada akhirnya kita masih ada di sini. Terima kasih karena sudah mau bertahan, terima kasih karena sudah mau menerima aku lagi, dan terima kasih karena sudah memilih untuk tetap berjalan bersamaku sampai hari ini.`,
  `Terima kasih juga karena selama ini kamu selalu menjadi orang yang ngga pernah lelah mendukung aku. Dari hal-hal kecil sampai hal-hal yang paling berat, kamu selalu ada. Kamu selalu jadi tempat aku bercerita, tempat aku mengeluh, tempat aku mencari semangat ketika semuanya terasa berat. Mungkin aku ngga selalu pandai menunjukkan rasa terima kasihku, tapi percayalah, aku sangat menghargai semua perhatian, kesabaran, dan kasih sayang yang kamu berikan setiap hari.`,
  `Di usia yang baru ini, aku berdoa semoga semua hal baik datang menghampirimu. Semoga kamu selalu diberi kesehatan, kebahagiaan, ketenangan hati, dan kekuatan untuk menghadapi apa pun yang ada di depan. Semoga semua usaha dan kerja kerasmu selama ini membuahkan hasil yang terbaik. Semoga skripsimu diberikan kelancaran sampai selesai, dipermudah setiap prosesnya, dipertemukan dengan orang-orang yang membantu, dan diberikan hasil yang memuaskan sesuai harapanmu. Semoga hari ini, saat kamu mengambil data skripsi, semuanya berjalan lancar tanpa hambatan, mendapatkan data yang kamu butuhkan, dan menjadi langkah besar menuju kelulusanmu nanti. Aamiin.`,
  `Aku tahu perjalananmu masih panjang, dan mungkin ke depan masih akan ada banyak tantangan yang harus kamu hadapi. Tapi aku harap kamu ngga pernah lupa bahwa kamu adalah orang yang hebat. Kamu sudah berhasil melewati begitu banyak hal yang dulu mungkin terasa mustahil. Jadi untuk apa pun yang sedang dan akan kamu perjuangkan, tetap percaya pada dirimu sendiri, karena aku percaya kamu pasti bisa.`,
  `Sekali lagi, selamat ulang tahun, cintaku. Terima kasih sudah hadir dan membawa begitu banyak kebahagiaan dalam hidupku. Terima kasih untuk semua tawa, perhatian, pengertian, dan cinta yang selalu kamu berikan. Aku berharap di usia 22 ini kamu mendapatkan lebih banyak alasan untuk tersenyum, lebih banyak mimpi yang terwujud, dan lebih banyak kebahagiaan yang pantas kamu dapatkan.`,
  `Aku sayang kamu, hari ini, besok, dan seterusnya. Semoga hubungan kita selalu diberikan jalan yang baik, dijauhkan dari hal-hal yang buruk, diberikan kesabaran untuk saling memahami, dan diberikan kesempatan untuk terus tumbuh bersama menjadi versi terbaik dari diri kita masing-masing. Semoga apa yang sedang kita perjuangkan sekarang bisa membawa kita ke masa depan yang sama, dengan cerita yang lebih indah lagi.`
];

/* Alternating flower color themes */
const themes = [
  { c1:'#FEF0F5', c2:'#E8A0B8', stem:'#A8C8A0' },
  { c1:'#FDE8F2', c2:'#D4789A', stem:'#9CC095' },
  { c1:'#FFF5F9', c2:'#E8A0B8', stem:'#B0CCA8' },
  { c1:'#FDE8F2', c2:'#C87898', stem:'#A8C8A0' },
];

/* Build cards */
const container = document.getElementById('cards-container');
paragraphs.forEach((text, i) => {
  const th = themes[i % themes.length];
  const cardClass = i % 2 === 0 ? 'card-a' : 'card-b';
  const cf = cornerFlowerSVG(th.c1, th.c2, th.stem);

  const section = document.createElement('section');
  section.className = 'para-section';
  section.innerHTML = `
    <div class="card-wrap">
      <div class="card ${cardClass}" data-card>
        <div class="floral-border" aria-hidden="true">
          ${borderSVG()}
          <!-- TL -->${cf.replace('class="fc"','class="fc fc-tl"')}
          <!-- TR -->${cf.replace('class="fc"','class="fc fc-tr"').replace('overflow="visible"','overflow="visible" style="transform:scaleX(-1)"')}
          <!-- BL -->${cf.replace('class="fc"','class="fc fc-bl"').replace('overflow="visible"','overflow="visible" style="transform:scaleY(-1)"')}
          <!-- BR -->${cf.replace('class="fc"','class="fc fc-br"').replace('overflow="visible"','overflow="visible" style="transform:scale(-1,-1)"')}
        </div>
        <p class="card-text">${text}</p>
      </div>
    </div>`;
  container.appendChild(section);
});

/* ══════════════════════════════════════
   SIZE FLORAL BORDER RECTS
══════════════════════════════════════ */
function sizeFloralBorders() {
  document.querySelectorAll('.floral-border').forEach(fb => {
    const card = fb.closest('.card');
    if (!card) return;
    const w = card.offsetWidth;
    const h = card.offsetHeight;
    const svg = fb.querySelector('.fb-svg');
    if (svg) {
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    }
    const rect = fb.querySelector('.fb-rect');
    if (rect) {
      rect.setAttribute('x', '10');
      rect.setAttribute('y', '10');
      rect.setAttribute('width', w - 20);
      rect.setAttribute('height', h - 20);
    }
    /* position mid ornaments */
    const midTop = fb.querySelector('.fb-mid-top');
    const midBot = fb.querySelector('.fb-mid-bot');
    const midLft = fb.querySelector('.fb-mid-lft');
    const midRgt = fb.querySelector('.fb-mid-rgt');
    const cx = w / 2, cy = h / 2;
    if (midTop) midTop.setAttribute('transform', `translate(${cx},10)`);
    if (midBot) midBot.setAttribute('transform', `translate(${cx},${h-10})`);
    if (midLft) midLft.setAttribute('transform', `translate(10,${cy})`);
    if (midRgt) midRgt.setAttribute('transform', `translate(${w-10},${cy})`);
  });
}
window.addEventListener('load', sizeFloralBorders);
window.addEventListener('resize', sizeFloralBorders);
setTimeout(sizeFloralBorders, 200);

/* ══════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════ */
const cardObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('in'), 50);
      cardObs.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('[data-card]').forEach(c => cardObs.observe(c));

const closeObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in'); closeObs.unobserve(e.target); }
  });
}, { threshold: 0.12 });
const closing = document.querySelector('[data-closing]');
if (closing) closeObs.observe(closing);

window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById('progress').style.width = (h > 0 ? (scrollY / h) * 100 : 0) + '%';

/* ══════════════════════════════════════
   CANVAS PARTICLE SYSTEM
══════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize, { passive: true });

  const COLORS = ['#F5C8D8','#E8A0B8','#FDF0F4','#FFDDE8','#FFB8CC','#ffffff'];

  function Particle() {
    this.reset = function() {
      this.x     = Math.random() * W;
      this.y     = -20;
      this.size  = 2.5 + Math.random() * 5;
      this.spd   = 0.4 + Math.random() * 0.75;
      this.drift = (Math.random() - 0.5) * 0.5;
      this.rot   = Math.random() * Math.PI * 2;
      this.rotSpd= (Math.random() - 0.5) * 0.025;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.alpha = 0.5 + Math.random() * 0.4;
      this.petal = Math.random() < 0.5;
    };
    this.reset();
    this.y = Math.random() * H;
  }

  const pts = Array.from({length: 32}, () => new Particle());

  function drawPetal(s) {
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.bezierCurveTo(s*0.6,-s*0.5, s*0.6,s*0.5, 0, s);
    ctx.bezierCurveTo(-s*0.6,s*0.5,-s*0.6,-s*0.5, 0,-s);
    ctx.fill();
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.y   += p.spd;
      p.x   += p.drift;
      p.rot += p.rotSpd;
      if (p.y > H + 20) p.reset();
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      if (p.petal) drawPetal(p.size);
      else { ctx.beginPath(); ctx.ellipse(0,0,p.size*0.55,p.size,0,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ══════════════════════════════════════
   TOUCH RIPPLE
══════════════════════════════════════ */
const rStyle = document.createElement('style');
rStyle.textContent = `@keyframes rA{from{transform:scale(.3);opacity:1}to{transform:scale(2.8);opacity:0}}`;
document.head.appendChild(rStyle);

document.addEventListener('touchstart', function(e) {
  const t = e.touches[0];
  const r = document.createElement('div');
  r.style.cssText = `position:fixed;left:${t.clientX-20}px;top:${t.clientY-20}px;width:40px;height:40px;border-radius:50%;background:rgba(232,160,184,0.3);pointer-events:none;z-index:9998;animation:rA .6s ease-out forwards`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
}, { passive: true });
</script>
